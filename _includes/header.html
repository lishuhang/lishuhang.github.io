<!-- ============================================================
     header.html – Sticky site header
     
     Contains: Logo, desktop navigation, hamburger (mobile)
     ============================================================ -->
<header class="site-header" role="banner">
  <div class="header-inner">
    <!-- Logo -->
    <a href="/" class="site-logo" aria-label="{{ site.title }} – 首页">
      <img src="{{ site.logo | default: '/assets/logo.svg' }}" alt="{{ site.title }}" width="36" height="36">
      {% if site.show_title != false %}
      <div class="brand-text">
        <span class="site-title">{{ site.title }}</span>
        <span class="site-description">{{ site.description }}</span>
      </div>
      {% endif %}
    </a>

    <!-- Desktop Navigation -->
    <nav class="header-nav" role="navigation" aria-label="主导航">
      <a href="/" {% if page.layout == 'home' %}class="active"{% endif %}>首页</a>
      <a href="/about/" {% if page.url == '/about/' %}class="active"{% endif %}>关于</a>
      <a href="https://lishuhang.me/daily/" target="_blank" rel="noopener noreferrer">AI 早报</a>
      <a href="/photos" target="_blank" rel="noopener noreferrer">图片库</a>
      <a href="/feed.xml" target="_blank" rel="noopener noreferrer">RSS</a>
      <a href="https://www.travellings.cn/go.html" target="_blank" rel="noopener noreferrer">友链接力</a>
    </nav>

    <!-- Hamburger (mobile only, toggles sidebar) -->
    <button class="hamburger" id="hamburgerButton" aria-label="打开菜单" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
