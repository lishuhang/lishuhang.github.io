<!-- ============================================================
     share.html – Share buttons for article pages
     
     Supports: Twitter/X, Weibo, WeChat QR, Copy link
     WeChat QR code generated on-demand (requires qrcode.js library)
     ============================================================ -->
<div class="share-bar" role="group" aria-label="分享文章">
  <span class="share-label">分享</span>

  <!-- Twitter / X -->
  <button class="share-btn" data-share="twitter" aria-label="分享到 Twitter" title="分享到 Twitter">

      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
  </button>

  <!-- Weibo -->
  <button class="share-btn" data-share="weibo" aria-label="分享到微博" title="分享到微博">

  <!-- Copy Link -->
  <button class="share-btn" data-share="copy" aria-label="复制链接" title="复制链接">

</div>
