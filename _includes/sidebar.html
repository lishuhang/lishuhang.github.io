<aside class="site-sidebar" id="site-sidebar">
  <!-- 搜索 -->
  <div class="sidebar-search">
    <div class="search-engine-row">
      <label class="engine-option"><input type="radio" name="engine" value="internal" checked> 站内</label>
      <label class="engine-option"><input type="radio" name="engine" value="google"> Google</label>
      <label class="engine-option"><input type="radio" name="engine" value="baidu"> 百度</label>
    </div>
    <form class="search-form">
      <input type="text" class="search-field" id="searchInput" placeholder="搜索文章...">
      <button type="submit" class="search-submit" aria-label="搜索">
        <svg class="icon-svg"><use href="#i-search"/></svg>
      </button>
    </form>
  </div>

  <!-- 移动端导航（竖屏时显示在搜索下方、文章存档上方） -->
  <nav class="mobile-nav">
    <a href="{{ '/' | relative_url }}">首页</a>
    <a href="{{ '/about' | relative_url }}">关于</a>
    <a href="https://lishuhang.me/daily/" target="_blank" rel="noopener noreferrer">AI 早报</a>
    <a href="/photos" target="_blank" rel="noopener noreferrer">图片库</a>
    <a href="{{ '/feed.xml' | relative_url }}" target="_blank" rel="noopener noreferrer">RSS</a>
    <a href="https://www.travellings.cn/go.html" target="_blank" rel="noopener noreferrer">友链接力</a>
  </nav>

  <!-- 文章存档（年份选择器） -->
  <div class="sidebar-section">
    <h3 class="sidebar-label sidebar-section-title">文章存档</h3>
    <div id="calendarWidget" class="sidebar-calendar"></div>
  </div>

  <!-- 标签 -->
  <div class="sidebar-section">
    <h3 class="sidebar-label sidebar-section-title">标签</h3>
    <div class="tags-cloud">
      {% for tag in site.tags %}
        {% unless tag[0] == 'AIGC' %}
      <a href="/?tag={{ tag[0] | uri_escape }}" class="tag-btn">{{ tag[0] }}</a>
        {% endunless %}
      {% endfor %}
    </div>
  </div>

  <!-- 原图开关 -->
  <div class="sidebar-toggle-row">
    <span class="sidebar-label">原图</span>
    <label class="toggle-switch">
      <input type="checkbox" id="originalImageToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <!-- 深色模式三态切换 -->
  <div class="sidebar-toggle-row">
    <span class="sidebar-label">主题</span>
    <div class="theme-switcher">
      <button class="theme-btn" data-theme="light" title="浅色">
        <svg class="icon-svg"><use href="#i-sun"/></svg>
      </button>
      <button class="theme-btn" data-theme="system" title="跟随系统">
        <svg class="icon-svg"><use href="#i-monitor"/></svg>
      </button>
      <button class="theme-btn" data-theme="dark" title="深色">
        <svg class="icon-svg"><use href="#i-moon"/></svg>
      </button>
    </div>
  </div>

  <!-- 版权 -->
  {% if site.copyright %}
  <div class="sidebar-section sidebar-copyright">
    {{ site.copyright | markdownify }}
  </div>
  {% endif %}
</aside>
