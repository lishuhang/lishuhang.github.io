<script>
  (function() {
    var container = document.querySelector('.giscus-container');
    if (!container) return;
    var script = document.createElement('script');
    script.src = 'https://giscus.app/client.js';
    script.setAttribute('data-repo', 'lishuhang/lishuhang.github.io');
    script.setAttribute('data-repo-id', 'R_kgDOKbcVHw');
    script.setAttribute('data-category', 'Announcements');
    script.setAttribute('data-category-id', 'DIC_kwDOKbcVH84CwoJY');
    script.setAttribute('data-mapping', 'specific');
    script.setAttribute('data-term', '{{ include.path | default: page.url }}');
    script.setAttribute('data-strict', '0');
    script.setAttribute('data-reactions-enabled', '1');
    script.setAttribute('data-emit-metadata', '1');
    script.setAttribute('data-input-position', 'bottom');
    script.setAttribute('data-theme', 'preferred_color_scheme');
    script.setAttribute('data-lang', 'zh-CN');
    script.setAttribute('crossorigin', 'anonymous');
    script.async = true;
    container.appendChild(script);
  })();
</script>
