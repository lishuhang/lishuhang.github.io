<!-- ============================================================
     comments.html – Giscus comments (lazy loaded)
     
     Giscus is NOT loaded on page load. It only loads when the
     comments section enters the viewport (via Intersection Observer
     in main.js). This saves 150-300KB on article pages.
     
     Configuration comes from data attributes, read by JS.
     ============================================================ -->
{% if page.comments != false %}
<section class="comments-section" aria-label="评论">
  <h2 class="comments-title">评论</h2>
  <div
    class="giscus-container"
    id="giscus-container"
    data-repo="{{ site.giscus.repo }}"
    data-repo-id="{{ site.giscus.repo-id }}"
    data-category="{{ site.giscus.category }}"
    data-category-id="{{ site.giscus.category-id }}"
    data-mapping="{{ site.giscus.mapping }}"
    data-lang="{{ site.giscus.lang }}"
  >
    <!-- Giscus iframe is inserted here by JS when section becomes visible -->
    <noscript>请启用 JavaScript 以查看评论。</noscript>
  </div>
</section>
{% endif %}
