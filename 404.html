---
layout: base
permalink: /404.html
---

<div class="error-page">
  <div>
    <h1>404</h1>
    <h2>页面未找到</h2>
    <p>抱歉，您访问的页面不存在或已被移除。</p>
    <a href="{{ '/' | relative_url }}" class="home-link">返回首页</a>

    <div class="error-suggestions">
      <h3 style="font-size: 1.1rem; color: var(--text); margin-bottom: 12px;">或许您会对这些最新文章感兴趣：</h3>
      {% for post in site.posts limit: 5 %}
        {% unless post.tags contains 'AIGC' %}
        <a href="{{ post.url | relative_url }}">
          {{ post.title }}
          <span>{{ post.date | date: "%Y-%m-%d" }}</span>
        </a>
        {% endunless %}
      {% endfor %}
    </div>
  </div>
</div>
