# ============================================================
# Site Configuration – lishuhang.me
# ============================================================

name: "航通社"
title: "航通社"
description: "你应该知道的历史、现在和未来"
url: "https://lishuhang.me"
domain: lishuhang.me
email: i@lishuhang.me
lang: zh

# Author
author:
  name: 书航

# ============================================================
# Theme & Appearance
# ============================================================

color: "#347df8"
logo: "/assets/logo.png"
show_title: false
header_accent_bg: false
copyright: "© 2006-2026 书航 [lishuhang.me](https://lishuhang.me)"

# ============================================================
# Build settings
# ============================================================

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Permalinks
permalink: /posts/:year/:month/:day/:title/

# Pagination (jekyll-paginate)
paginate: 10
paginate_path: "/page/:num/"

# Collections
collections:
  posts:
    permalink: /posts/:year/:month/:day/:title/
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# ============================================================
# Plugins
# ============================================================

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# ============================================================
# SEO & Analytics
# ============================================================

google_analytics: ""
google_site_verification: ""
bing_site_verification: ""
robots: "index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1, archive"

# Social
twitter:
  username: lishuhang

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - .gitignore

# ============================================================
# Giscus comments
# ============================================================

giscus:
  repo: lishuhang/lishuhang.github.io
  repo-id: "R_kgDOKbcVHw"
  category: Announcements
  category-id: "DIC_kwDOKbcVH84CwoJY"
  mapping: specific
  reactions-enabled: 1
  emit-metadata: 1
  lang: zh-CN

# ============================================================
# Image proxy (weserv.nl)
# ============================================================

image_proxy: "https://images.weserv.nl/?url="
