# ============================================================
# Site Configuration – lishuhang.me
# ============================================================

name: "航通社"
title: "航通社"
description: "你应该知道的历史、现在和未来"
url: "https://lishuhang.me"
domain: lishuhang.me
email: i@lishuhang.me
lang: zh

# Author
author:
  name: 书航

# ============================================================
# Theme & Appearance
# ============================================================

color: "#347df8"
logo: "/assets/logo.png"
show_title: false
header_accent_bg: false
copyright: "© 2006-2026 书航 [lishuhang.me](https://lishuhang.me)"

# ============================================================
# Build settings
# ============================================================

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Permalinks
permalink: /posts/:year/:month/:day/:title/

# Pagination (jekyll-paginate)
paginate: 10
paginate_path: "/page/:num/"

# Collections
collections:
  posts:
    permalink: /posts/:year/:month/:day/:title/
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# ============================================================
# Plugins
# ============================================================

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# ============================================================
# SEO & Analytics
# ============================================================

google_analytics: ""
google_site_verification: ""
bing_site_verification: ""
robots: "index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1, archive"

# Social
twitter:
  username: lishuhang

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - .gitignore

# ============================================================
# Giscus comments
# ============================================================

giscus:
  repo: lishuhang/lishuhang.github.io
  repo-id: "R_kgDOKbcVHw"
  category: Announcements
  category-id: "DIC_kwDOKbcVH84CwoJY"
  mapping: specific
  reactions-enabled: 1
  emit-metadata: 1
  lang: zh-CN

# ============================================================
# Image proxy (weserv.nl)
# ============================================================

image_proxy: "https://images.weserv.nl/?url="

# ============================================================
# Image storage prefixes (v2.0, keepitrun v2.0)
# ============================================================
# Posts store image URLs as relative paths: /img/YYYY/MM/DD/slug/NN.png
# At build time, _plugins/image_prefix.rb rewrites them to full URLs
# based on the post's date and the prefix ranges below.
#
# To migrate images to a different storage (e.g., Cloudflare R2, another
# repo), change the prefix for the corresponding date range. All posts in
# that date range will automatically use the new prefix.
#
# Format: range = [start_YYYYMM, end_YYYYMM)
#   null start = -infinity, null end = +infinity
image_prefixes:
  - range: [null, "2024-01"]        # before 2024-01 → prefix A
    prefix: "https://lishuhang.me"
  - range: ["2024-01", "2026-07"]   # 2024-01 to 2026-07 → prefix B
    prefix: "https://lishuhang.me"
  - range: ["2026-07", null]        # 2026-07 onwards → prefix C (default: same as A/B)
    prefix: "https://lishuhang.me"
