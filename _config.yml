# Site
name: "航通社"
title: "航通社"
description: "你应该知道的历史、现在和未来"
url: "https://lishuhang.me"
domain: lishuhang.me
email: i@lishuhang.me

lang: zh

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  posts:
    permalink: /posts/:year/:month/:day/:title/
    output: true

color: "#347df8"    # 主题色，决定全站 accent color

logo: "/assets/logo.svg"
show_title: true   # true = 同时显示站点标题和描述，false = 仅显示 Logo
header_accent_bg: false   # true = 页眉使用主题色背景，始终显示浅色文字

copyright: "© 2025 书航 [lishuhang.me](https://lishuhang.me)"

# Analytics（留空则不加载）
google_analytics: ""

# SEO 验证（留空则不加载）
google_site_verification: ""
bing_site_verification: ""

# 搜索引擎爬虫指令
robots: "index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1, archive"

authors:
  james:
    name: James Li
    display_name: James
    email: i@lishuhang.me
    web: https://lishuhang.me
    description: "书航，航通社创始人"
