<!-- ============================================================
     base.html – Base layout (HTML skeleton)
     
     Architecture:
     - No inline JSON data (moved to /assets/data/posts.js)
     - Critical CSS inlined in head.html
     - All JS deferred
     - Floating buttons (back-to-top) at bottom
     ============================================================ -->
<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}" data-theme="light">
{% include head.html %}

<body>
  <div class="site-wrapper">
    <!-- Header -->
    {% include header.html %}

    <!-- Main content + Sidebar -->
    <div class="site-main">
      <main class="content-area" role="main">
        {{ content }}
      </main>

      {% include sidebar.html %}
    </div>

    <!-- Footer -->
    <footer class="site-footer" role="contentinfo">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.author.name }} · 使用 <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a> 构建</p>
    </footer>
  </div>

  <!-- Floating buttons -->
  <div class="float-buttons">
    <button class="float-btn back-to-top" aria-label="回到顶部" title="回到顶部">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </button>
  </div>
</body>
</html>
