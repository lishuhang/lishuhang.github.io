<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "zh" }}" data-theme="light">
  {% include head.html %}

  <body>
    <div class="blog-container">
      {% include sidebar.html %}

      <main class="blog-main" id="blogMain">
        {{ content }}
      </main>
    </div>

    <!-- 移动端顶栏 -->
    <div class="mobile-header">
      <div class="mobile-header-logo">
        <a href="{{ '/' | relative_url }}">
          <img src="{{ '/assets/logo.svg' | relative_url }}" alt="{{ site.title }}" class="logo-image">
        </a>
        <a href="{{ '/' | relative_url }}" class="logo-text">{{ site.title }}</a>
      </div>
      <button class="hamburger-button" id="hamburgerButton" aria-label="打开菜单">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>

    <!-- 移动端遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 浮动按钮 -->
    <div class="floating-buttons" id="floatingButtons">
      <button id="scrollToTopBtn" class="floating-btn" title="回到顶部">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5M12 5L5 12M12 5L19 12"/>
        </svg>
      </button>
    </div>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
