<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "zh" }}" data-theme="light">
  {% include head.html %}

  <body>
    <!-- SVG 图标 -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none;" aria-hidden="true">
      <symbol id="i-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </symbol>
      <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </symbol>
      <symbol id="i-arrow-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5M12 5L5 12M12 5L19 12"/>
      </symbol>
      <symbol id="i-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </symbol>
      <symbol id="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </symbol>
      <symbol id="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </symbol>
      <symbol id="i-monitor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </symbol>
      <symbol id="i-weibo" viewBox="0 0 24 24" fill="currentColor">
        <path d="M10.098 20.323c-3.977.391-7.414-1.406-7.672-4.02-.259-2.609 2.759-5.047 6.74-5.441 3.979-.394 7.413 1.404 7.671 4.018.259 2.6-2.759 5.049-6.739 5.443zm-1.119-7.344c-2.448.313-4.384 1.97-4.328 3.695.058 1.726 2.088 2.883 4.533 2.573 2.448-.309 4.382-1.969 4.326-3.695-.056-1.729-2.083-2.886-4.531-2.573zM16.5 6.5c-1.336-.625-2.816-.066-3.309 1.253-.488 1.322.191 2.847 1.528 3.469 1.34.62 2.818.065 3.308-1.257.488-1.322-.191-2.846-1.527-3.465zm4.5-1.5c-2.125-1-4.488-.109-5.272 1.993-.781 2.108.316 4.522 2.441 5.518 2.121.999 4.484.111 5.266-1.993.779-2.106-.312-4.519-2.435-5.518zM10.25 17.625c-.551.063-1.016-.281-1.047-.77-.027-.488.395-.937.945-1 .555-.066 1.016.281 1.047.77s-.395.938-.945 1z"/>
      </symbol>
      <symbol id="i-twitter" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </symbol>
    </svg>

    {% include header.html %}

    <div class="site-layout">
      <main class="site-main">
        {{ content }}
      </main>
      {% include sidebar.html %}
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="floating-buttons">
      <button id="scrollToTopBtn" class="floating-btn" title="回到顶部">
        <svg class="icon-svg"><use href="#i-arrow-up"/></svg>
      </button>
    </div>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

    <!-- 日历数据（所有页面都需要，体积小） -->
    <script>
    window.__CD__={};
    {% for post in site.posts %}
    {% unless post.tags contains 'AIGC' %}
    (function(){var k='{{ post.date | date: "%Y-%m" }}';if(!window.__CD__[k])window.__CD__[k]=new Set();window.__CD__[k].add({{ post.date | date: "%d" | plus: 0 }});})();
    {% endunless %}
    {% endfor %}
    </script>

    <!-- 文章全量数据 + 预建索引（仅首页，避免阻塞侧边栏） -->
    {% if page.layout == 'home' or page.home %}
    <script>
    window.__POSTS__=[];window.__TI__={};window.__YI__={};window.__MI__={};
    {% assign idx = 0 %}
    {% for post in site.posts %}
    {% unless post.tags contains 'AIGC' %}
    window.__POSTS__.push({u:{{post.url|relative_url|jsonify}},t:{{post.title|jsonify}},d:{{post.date|date:'%Y-%m-%d'|jsonify}},y:{{post.date|date:'%Y'|jsonify}},m:{{post.date|date:'%m'|jsonify}},g:{{post.tags|join:','|jsonify}},e:{{post.excerpt|strip_html|normalize_whitespace|truncatewords:30|jsonify}},i:{%if post.image%}{{post.image|absolute_url|jsonify}}{%else%}null{%endif%}});
    {% for t in post.tags %}(window.__TI__['{{ t }}']||(window.__TI__['{{ t }}']=[])).push({{ idx }});{% endfor %}
    (window.__YI__['{{ post.date | date: "%Y" }}']||(window.__YI__['{{ post.date | date: "%Y" }}']=[])).push({{ idx }});
    (window.__MI__['{{ post.date | date: "%Y-%m" }}']||(window.__MI__['{{ post.date | date: "%Y-%m" }}']=[])).push({{ idx }});
    {% assign idx = idx | plus: 1 %}
    {% endunless %}
    {% endfor %}
    </script>
    {% endif %}
  </body>
</html>
