---
layout: base
---

<!-- 过滤条件标题 -->
<div id="filterHeader" class="filter-header" style="display: none;">
  <h1 id="filterTitle" class="filter-title"></h1>
</div>

<!-- 文章列表（仅渲染前 10 条非 AIGC 文章） -->
<div id="postsContainer" class="posts-container">
  {% assign shown = 0 %}
  {% for post in site.posts %}
    {% unless post.tags contains 'AIGC' %}
      {% if shown < 10 %}
        {% include post-card.html %}
      {% endif %}
      {% assign shown = shown | plus: 1 %}
    {% endunless %}
  {% endfor %}
</div>

<!-- 无限滚动哨兵 -->
<div id="scrollSentinel"></div>

<!-- 结束提示 -->
<div id="noMorePosts" class="no-more" style="display: none;"></div>

<!-- 全部文章数据（内嵌 JSON，供 JS 按需生成后续卡片） -->
<script type="application/json" id="postsData">[
{%- assign comma = false -%}
{%- for post in site.posts -%}
  {%- unless post.tags contains 'AIGC' -%}
    {%- if comma -%},{%- endif -%}
    {"url":"{{ post.url | relative_url }}","title":"{{ post.title | escape }}","date":"{{ post.date | date: '%Y-%m-%d' }}","year":"{{ post.date | date: '%Y' }}","tags":"{{ post.tags | join: ',' }}","excerpt":"{{ post.excerpt | strip_html | truncatewords: 30 | escape }}","image":{%- if post.image -%}"https://images.weserv.nl/?url={{ post.image | absolute_url | url_encode }}&w=400&h=200&output=jpg&q=80&fit=cover"{%- else -%}null{%- endif -%}}
    {%- assign comma = true -%}
  {%- endunless -%}
{%- endfor -%}
]</script>
