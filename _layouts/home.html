---
layout: base
---

<!-- 过滤条件标题 -->
<div id="filterHeader" class="filter-header" style="display: none;">
  <h1 id="filterTitle" class="filter-title"></h1>
</div>

<!-- 加载提示（有 URL 过滤参数时显示） -->
<div id="loadingHint" class="loading-hint" style="display: none;">
  <div class="loading-spinner"></div>
  <span>正在筛选文章...</span>
</div>

<!-- 文章列表（HTML 预渲染前 10 条） -->
<div id="postsContainer" class="posts-container">
  {% assign shown = 0 %}
  {% for post in site.posts %}
    {% unless post.tags contains 'AIGC' %}
      {% if shown < 10 %}
        {% include post-card.html %}
      {% endif %}
      {% assign shown = shown | plus: 1 %}
    {% endunless %}
  {% endfor %}
</div>

<!-- 有 URL 过滤参数时，隐藏预渲染内容，显示加载提示 -->
<script>(function(){
  if(location.search){
    var c=document.getElementById('postsContainer');if(c)c.style.display='none';
    var l=document.getElementById('loadingHint');if(l)l.style.display='flex';
  }
})();</script>

<!-- 翻页导航 -->
<div id="pagination" class="pagination"></div>

<!-- 无结果提示 -->
<div id="noResults" class="no-more" style="display: none;"></div>
