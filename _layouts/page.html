<!-- ============================================================
     page.html – Static page layout
     
     Used for: About, 404, and other standalone pages
     No posts.js loaded, no comments by default
     ============================================================ -->
---
layout: base
---

<article class="page-article">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
  </header>

  <div class="page-content">
    {{ content }}
  </div>
</article>
